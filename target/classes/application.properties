spring.application.name=spring-backend

# Server Configuration
server.port=4000
# Allow large PDF uploads
spring.servlet.multipart.max-file-size=120MB
spring.servlet.multipart.max-request-size=120MB

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fullstackpro?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
