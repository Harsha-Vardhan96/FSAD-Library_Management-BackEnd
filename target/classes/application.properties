spring.application.name=spring-backend

# Server Configuration
server.port=${PORT:8080}
# Allow large PDF uploads
spring.servlet.multipart.max-file-size=120MB
spring.servlet.multipart.max-request-size=120MB

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fullstackpro?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
